name: sccc-production

x-build-args: &build-args
  NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL in .env.production.local}"
  NEXT_PUBLIC_MARKETING_URL: "${NEXT_PUBLIC_MARKETING_URL:?Set NEXT_PUBLIC_MARKETING_URL in .env.production.local}"

x-migrate-env: &migrate-env
  NODE_ENV: production
  DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL in .env.production.local}"

x-saas-env: &saas-env
  NODE_ENV: production
  NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL in .env.production.local}"
  DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL in .env.production.local}"
  REDIS_URL: "${REDIS_URL:?Set REDIS_URL in .env.production.local}"
  SCCC_RATE_LIMIT_STORE: "${SCCC_RATE_LIMIT_STORE:-}"
  AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET in .env.production.local}"
  SCCC_PLUGIN_SIGNING_SECRET: "${SCCC_PLUGIN_SIGNING_SECRET:?Set SCCC_PLUGIN_SIGNING_SECRET in .env.production.local}"
  SCCC_TOKEN_ENCRYPTION_KEY: "${SCCC_TOKEN_ENCRYPTION_KEY:?Set SCCC_TOKEN_ENCRYPTION_KEY in .env.production.local}"
  SCCC_DATA_STORE: prisma
  SCCC_EMAIL_TRANSPORT: "${SCCC_EMAIL_TRANSPORT:-smtp}"
  SCCC_EMAIL_FROM: "${SCCC_EMAIL_FROM:?Set SCCC_EMAIL_FROM in .env.production.local}"
  SCCC_SMTP_HOST: "${SCCC_SMTP_HOST:-}"
  SCCC_SMTP_PORT: "${SCCC_SMTP_PORT:-587}"
  SCCC_SMTP_SECURE: "${SCCC_SMTP_SECURE:-false}"
  SCCC_SMTP_USER: "${SCCC_SMTP_USER:-}"
  SCCC_SMTP_PASSWORD: "${SCCC_SMTP_PASSWORD:-}"
  SCCC_BILLING_PROVIDER: "${SCCC_BILLING_PROVIDER:-none}"
  SCCC_STRIPE_SECRET_KEY: "${SCCC_STRIPE_SECRET_KEY:-}"
  SCCC_STRIPE_PRICE_STARTER: "${SCCC_STRIPE_PRICE_STARTER:-}"
  SCCC_STRIPE_PRICE_PRO: "${SCCC_STRIPE_PRICE_PRO:-}"
  SCCC_STRIPE_PRICE_AGENCY: "${SCCC_STRIPE_PRICE_AGENCY:-}"
  SCCC_BILLING_SUCCESS_URL: "${SCCC_BILLING_SUCCESS_URL:-}"
  SCCC_BILLING_CANCEL_URL: "${SCCC_BILLING_CANCEL_URL:-}"
  SCCC_BILLING_PORTAL_RETURN_URL: "${SCCC_BILLING_PORTAL_RETURN_URL:-}"
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
  SCCC_GSC_CLIENT_ID: "${SCCC_GSC_CLIENT_ID:-}"
  SCCC_GSC_CLIENT_SECRET: "${SCCC_GSC_CLIENT_SECRET:-}"
  SCCC_GSC_REDIRECT_URI: "${SCCC_GSC_REDIRECT_URI:-}"
  SCCC_GSC_STATE_SECRET: "${SCCC_GSC_STATE_SECRET:-}"
  SCCC_AI_PROVIDER: "${SCCC_AI_PROVIDER:-}"
  SCCC_AI_API_KEY: "${SCCC_AI_API_KEY:-}"
  SCCC_AI_MODEL: "${SCCC_AI_MODEL:-}"
  POSTHOG_KEY: "${POSTHOG_KEY:-}"
  POSTHOG_HOST: "${POSTHOG_HOST:-}"
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-production}"

x-marketing-env: &marketing-env
  NODE_ENV: production
  NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL in .env.production.local}"
  NEXT_PUBLIC_MARKETING_URL: "${NEXT_PUBLIC_MARKETING_URL:?Set NEXT_PUBLIC_MARKETING_URL in .env.production.local}"
  SCCC_MARKETING_LEAD_WEBHOOK_URL: "${SCCC_MARKETING_LEAD_WEBHOOK_URL:?Set SCCC_MARKETING_LEAD_WEBHOOK_URL in .env.production.local}"
  SCCC_MARKETING_LEAD_WEBHOOK_SECRET: "${SCCC_MARKETING_LEAD_WEBHOOK_SECRET:-}"

x-worker-env: &worker-env
  NODE_ENV: production
  DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL in .env.production.local}"
  REDIS_URL: "${REDIS_URL:?Set REDIS_URL in .env.production.local}"
  SCCC_TOKEN_ENCRYPTION_KEY: "${SCCC_TOKEN_ENCRYPTION_KEY:?Set SCCC_TOKEN_ENCRYPTION_KEY in .env.production.local}"
  SCCC_GSC_CLIENT_ID: "${SCCC_GSC_CLIENT_ID:-}"
  SCCC_GSC_CLIENT_SECRET: "${SCCC_GSC_CLIENT_SECRET:-}"
  SCCC_WORKER_HEALTH_PORT: "${SCCC_WORKER_HEALTH_PORT:-8080}"
  POSTHOG_KEY: "${POSTHOG_KEY:-}"
  POSTHOG_HOST: "${POSTHOG_HOST:-}"
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-production}"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env.production.local}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production.local}"
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env.production.local}"
    volumes:
      - sccc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - sccc_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      args: *build-args
    environment: *migrate-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  saas:
    build:
      context: .
      dockerfile: Dockerfile
      target: saas
      args: *build-args
    environment: *saas-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  marketing:
    build:
      context: .
      dockerfile: Dockerfile
      target: marketing
      args: *build-args
    environment: *marketing-env
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args: *build-args
    environment: *worker-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  sccc_postgres_data:
  sccc_redis_data:
