name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npm run db:validate
      - run: npm run db:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run plugin:package
      - uses: actions/upload-artifact@v4
        with:
          name: seo-content-control-center-plugin
          path: dist/seo-content-control-center-*.zip
          if-no-files-found: error

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3

  plugin-certification:
    name: Plugin certification (${{ matrix.wordpress-image }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        wordpress-image:
          - wordpress:php8.1-apache
          - wordpress:php8.2-apache
          - wordpress:php8.3-apache
          - wordpress:6.8-php8.2-apache

    steps:
      - uses: actions/checkout@v4

      - run: scripts/certify-wordpress-plugin.sh
        env:
          SCCC_WP_IMAGE: ${{ matrix.wordpress-image }}
