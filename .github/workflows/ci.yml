name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - run: npm ci
      - run: npm run db:validate
      - run: npm run lint
      - run: npm test
      - run: npm run build
